name: Update Market Summaries

on:
  schedule:
    # UTC 기준
    # KST 08:40 = UTC 23:40 (전날)
    - cron: "40 23 * * 0-4"
    # KST 10:30 = UTC 01:30
    - cron: "30 1 * * 1-5"
    # KST 15:40 = UTC 06:40
    - cron: "40 6 * * 1-5"

  workflow_dispatch:
    inputs:
      force_stage:
        description: "pre_open / intraday / close"
        required: true
        default: "pre_open"

jobs:
  preopen:
    if: github.event_name == 'schedule' && github.event.schedule == '40 23 * * 0-4'
    runs-on: ubuntu-latest
    env:
      FORCE_STAGE: pre_open
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai supabase requests yfinance pandas

      - name: Run pre-open summary
        run: python update_summary.py

  morning:
    if: github.event_name == 'schedule' && github.event.schedule == '30 1 * * 1-5'
    runs-on: ubuntu-latest
    env:
      FORCE_STAGE: intraday
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai supabase requests yfinance pandas

      - name: Run morning summary
        run: python update_summary.py

  close:
    if: github.event_name == 'schedule' && github.event.schedule == '40 6 * * 1-5'
    runs-on: ubuntu-latest
    env:
      FORCE_STAGE: close
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai supabase requests yfinance pandas

      - name: Run close summary
        run: python update_summary.py

  manual-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_STAGE: ${{ github.event.inputs.force_stage }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate force_stage
        run: |
          if [ "$FORCE_STAGE" != "pre_open" ] && [ "$FORCE_STAGE" != "intraday" ] && [ "$FORCE_STAGE" != "close" ]; then
            echo "Invalid FORCE_STAGE: $FORCE_STAGE"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai supabase requests yfinance pandas

      - name: Run manual summary
        run: python update_summary.py
